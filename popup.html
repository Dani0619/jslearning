<style>
    .overlay{
        background-color: black;
        width:100%;
        height:100%;
        position: absolute;
        opacity:0.8;
        left:0px;
        top:0px;
        z-index: 1;
        display:none
    }
    .popupbox{
        background-color:red;
        color: black;
        position:absolute;
        left:30%;
        z-index:2;
        width: 40%;
        border-radius: 10px;
        padding: 20px;
        display:none
        

    }
</style>



<button onclick="update()">Show</button>
<div class="overlay"></div>
<div class="popupbox">
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Corporis provident eius quos quia dolorum? Nostrum voluptas accusamus, aliquid reprehenderit expedita cumque illo quibusdam neque, aut sapiente libero facilis quidem et.
    </p>
    <button onclick="closed()">close</button>

</div>


<script>
    //select overlay
    var overlay=document.querySelector(".overlay")
    //select popupbox
    var popupbox=document.querySelector(".popupbox")
    function update(){
        overlay.style.display="block"
        popupbox.style.display="block"
    }
    function closed(){
        overlay.style.display="none"
        popupbox.style.display="none"
    }
</script>
