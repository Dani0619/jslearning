<style>
    div{
        background-color: aqua;
        width:100px;
        height:100px;
        transition: 2s;
    }
    .withmax{
        width :250px;
    }
</style>
<div id="box"></div>
<button onclick="change()">Clickhere</button>

<script>
    var box=document.getElementById("box")
    function change(){
            box.setAttribute("class","withmax")
            box.style.backgroundColor= "red"
        }
</script>
